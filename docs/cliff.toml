# git-cliff configuration for vLLM-lite.
#
# Generates CHANGELOG.md sections per release from conventional commit
# messages (used by .github/workflows/release.yml). Local preview:
#   cargo install git-cliff
#   git cliff --tag v0.2.0 --strip all

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits | sort(attribute="message") %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
    {% endfor %}
{% endfor %}
"""
trim = true
footer = """
<!-- Generated by git-cliff. Do not edit by hand. -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
# Treat version tags like v0.1.0 and v23.0 the same.
tag_pattern = "v[0-9]+.[0-9]+(.0)?"
skip_tags = ""
ignore_tags = ""

[commit_parsers]
# Conventional commit shapes we recognize. Order matters: more specific first.
# Breaking changes (with `!`) are tagged and emitted first in their section.
{ message = "^feat", group = "Features" }
{ message = "^fix", group = "Bug Fixes" }
{ message = "^perf", group = "Performance" }
{ message = "^refactor", group = "Refactoring" }
{ message = "^docs", group = "Documentation" }
{ message = "^test", group = "Testing" }
{ message = "^build", group = "Build System" }
{ message = "^ci", group = "Continuous Integration" }
{ message = "^chore", group = "Chores" }
{ message = "^bench", group = "Benchmarks" }
{ message = "^style", group = "Style" }
# Fall-through: anything that doesn't match a known prefix still appears under
# "Other" so it isn't lost. Helps spot non-conventional commits during review.
{ message = ".*", group = "Other", skip = false }

# Protect breaking-change markers so they always show up under their primary group.
filter_commits = false
protect_breaking_commits = false

[links]
# Stable set of links used by cliff's templating engine when commit messages
# reference issue/PR numbers. Update these per-repo.
github = "https://github.com/pplmx/vllm-lite"

[git.github]
owner = "pplmx"
repo = "vllm-lite"
