name: Release

# Triggered by a `vX.Y.Z` tag push (matches the conventional SemVer pattern
# used by vLLM-lite). Builds:
#   * Workspace release binaries for linux/darwin/windows (matrix)
#   * Docker images (multi-arch linux/amd64 + linux/arm64) → GHCR
#   * GitHub Release with auto-generated notes (via git-cliff)
#
# Manual dispatch allows dry-run / pre-flight without tagging.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip publish step)"
        required: false
        default: "true"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Use MUSL for fully-static Linux binaries (no glibc dependency).
  # CUDA cannot be cross-compiled in CI; CUDA features are only enabled
  # for the linux-amd64 native build.

jobs:
  # 1. Compute the version + verify CHANGELOG was bumped for this tag.
  #
  # GOV-01 (technical due diligence): the workspace version in
  # Cargo.toml is the single source of truth. The tag must match.
  # `scripts/release-manifest.sh --validate` enforces the contract
  # and also writes the manifest env file that downstream jobs
  # (Docker, Chart, GitHub Release) all consume.
  meta:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.manifest.outputs.version }}
      is_prerelease: ${{ steps.manifest.outputs.is_prerelease }}
      image_tag: ${{ steps.manifest.outputs.image_tag }}
      chart_version: ${{ steps.manifest.outputs.chart_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: manifest
        run: |
          TAG_REF="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Dry-run: use whatever the workspace says; do not validate.
            bash scripts/release-manifest.sh \
              --out target/release-manifest.env > /dev/null
          else
            bash scripts/release-manifest.sh \
              --validate "$TAG_REF" \
              --out target/release-manifest.env > /dev/null
          fi
          # shellcheck disable=SC1091
          set -a; source target/release-manifest.env; set +a
          echo "version=$VLLM_VERSION"         >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$VLLM_IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "image_tag=$VLLM_IMAGE_TAG"     >> "$GITHUB_OUTPUT"
          echo "chart_version=$VLLM_CHART_VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload manifest env
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: target/release-manifest.env

  # 2. Build workspace binaries for multiple targets.
  build:
    name: Build (${{ matrix.target }})
    needs: meta
    runs-on: ${{ matrix.os }}
    # SBOM upload (anchore/sbom-action) and binary upload both
    # write workflow artifacts; `contents: write` lets the SBOM
    # step also publish release assets when wired to the release
    # job. `actions: read` is implicit on public repos but listed
    # explicitly per the action's documented permissions.
    permissions:
      contents: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            features: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            # Cross-compile via apt-installed gcc-aarch64-linux-gnu
            features: ""
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            features: ""
          - target: x86_64-apple-darwin
            os: macos-13
            features: ""
          - target: aarch64-apple-darwin
            os: macos-14
            features: ""
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            features: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."

      - name: Build release
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p vllm-server \
            --locked

      - name: Package binary
        shell: bash
        run: |
          mkdir -p artifacts
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${{ matrix.target }}/release/vllm-server.exe" "artifacts/vllm-server-${{ needs.meta.outputs.version }}-${{ matrix.target }}.exe"
          else
            cp "target/${{ matrix.target }}/release/vllm-server" "artifacts/vllm-server-${{ needs.meta.outputs.version }}-${{ matrix.target }}"
          fi

      # Engineering-quality §7 (MSRV 与可复现构建) last bullet:
      # "release 生成 SBOM、校验和与构建 provenance". This step
      # closes the SBOM half. Anchore's `syft` (under the hood)
      # scans the packaged binary in `artifacts/` plus the
      # workspace's Cargo.lock to produce a CycloneDX JSON SBOM
      # capturing Rust crates, vendored C libraries, and any
      # system libs that ended up linked into the binary.
      #
      # The artifact glob `artifacts/**/*` in the `release` job
      # below picks this up automatically — no extra wiring is
      # needed to attach it to the GitHub Release.
      #
      # `upload-artifact: true` keeps it downloadable from the
      # workflow run too (useful for one-off inspection without
      # cutting a release).
      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.target }}
          upload-artifact: true

      # Engineering-quality §7 (MSRV 与可复现构建) last bullet:
      # "release 生成 SBOM、校验和与构建 provenance". P11 closed the
      # SBOM half (the step above); this step closes the **checksums**
      # half. After every artifact has landed in `artifacts/` (binary,
      # SBOM, and any chart if the workspace ever moves it here), we
      # compute SHA-256 over each file and write a single
      # `SHA256SUMS` file in the standard two-column format
      # (`<hash>  `) produced by `sha256sum -b`.
      #
      # The existing `Upload artifact` step below uploads the entire
      # `artifacts/` directory, which now includes `SHA256SUMS` too;
      # the `release` job's `artifacts/**/*` glob then attaches it
      # to the GitHub Release automatically. No separate upload step
      # is needed.
      #
      # **NOT** yet covered (v32+ candidates, tracked separately):
      # - signed build provenance (SLSA / in-toto) — requires a
      #   signature-key story (where does the maintainer key live,
      #   how is it rotated?) and a reproducible-build posture
      #   (the build env itself isn't pinned to a specific image
      #   today, only the Rust toolchain via `rust-toolchain.toml`)
      # - per-artifact sigstore signatures — same blocker
      - name: Generate SHA256SUMS
        shell: bash
        run: |
          cd artifacts
          # Truncate (or create) the file; the loop below skips it
          # so we never hash a half-written file or include it in
          # its own digest.
          : > SHA256SUMS
          for f in *; do
            [ "$f" = "SHA256SUMS" ] && continue
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS
          done
          echo "----- SHA256SUMS -----"
          cat SHA256SUMS

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vllm-server-${{ matrix.target }}
          path: artifacts/

  # 3. Publish GitHub Release (only on tag push, not on dry-run).
  release:
    name: GitHub Release
    needs: [meta, build, chart]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: docs/cliff.toml
          args: --tag v${{ needs.meta.outputs.version }} --strip all
        env:
          OUTPUT: CHANGELOG.md

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.meta.outputs.version }}
          name: v${{ needs.meta.outputs.version }}
          body: ${{ steps.git-cliff.outputs.content }}
          draft: false
          prerelease: ${{ needs.meta.outputs.is_prerelease == 'true' }}
          fail_on_unmatched_files: true
          files: |
            artifacts/**/*

  # 4. Helm Chart package (GOV-01 follow-up).
  #
  # The committed `Chart.yaml` carries placeholder `version` /
  # `appVersion` (documented in the file itself). At release time
  # we substitute the manifest's `VLLM_CHART_VERSION` /
  # `VLLM_CHART_APP_VERSION` into Chart.yaml, then `tar` the
  # chart directory into a `.tgz` and attach it to the GitHub
  # Release via the `release` job's `files` glob.
  #
  # This avoids a helm action dependency for what is
  # effectively a 2-line substitution + archive step.
  chart:
    name: Helm Chart
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download manifest env
        uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: target

      # shellcheck disable=SC1091
      - name: Sync Chart.yaml version
        env:
          VLLM_CHART_VERSION: ${{ needs.meta.outputs.chart_version }}
        run: |
          set -a; source target/release-manifest.env; set +a
          bash scripts/sync-chart-version.sh

      - name: Package chart (.tgz)
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/vllm-lite-$VLLM_CHART_VERSION.tgz" \
              -C k8s/charts vllm-lite
          ls -lh artifacts/

      - name: Upload chart artifact
        uses: actions/upload-artifact@v7
        with:
          name: vllm-lite-chart
          path: artifacts/vllm-lite-*.tgz
