name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable CUDA in CI (GitHub runners don't have GPU)
  CANDLE_NATIVE_BACKEND: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo (Swatinem rust-cache â€” profile/target-aware)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf

      - name: Doc check
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace

      - name: Doctest
        # Doctest examples in `///` doc comments are part of the contract.
        # They are NOT exercised by `cargo nextest run` (which only runs
        # #[test] / #[tokio::test] functions). A broken doc-example is
        # silently shipped today â€” this step blocks PRs that introduce one.
        # Wall-clock: ~30s on cold cache, <5s warm. All-features so doctests
        # gated behind optional features are also verified.
        run: cargo test --doc --workspace --all-features --no-fail-fast

      - name: Test
        run: cargo nextest run --workspace --no-fail-fast

      - name: Public API baseline check
        run: |
          cargo install cargo-public-api --locked
          bash .planning/phase-12e/check-public-api.sh

      - name: Doc coverage gate
        # Phase 31-E (technical due diligence): doc-coverage real-pct
        # must stay at or above the target (default 65%). The
        # `real` mode blanks out `#[cfg(test)]` modules,
        # `#[doc(hidden)]` items, and `#[derive(...)]` so the
        # percentage reflects genuine user-facing documentation
        # effort rather than incidental coverage of auto-generated
        # items. Pre-fix the gate did not exist; the `real` doc
        # coverage number in STATE.md / CHANGELOG could drift down
        # without anyone noticing. Threshold can be overridden via
        # the `DOC_COVERAGE_MIN` repo / workflow variable.
        env:
          DOC_COVERAGE_MIN: '65.0'
        run: |
          json=$(bash scripts/doc_coverage.sh --real json)
          # Compute workspace aggregate from per-crate fields. The
          # script emits each crate's `real_total` /
          # `real_documented` so a single pass over the JSON gives
          # us the workspace number we want to gate on.
          real_pct=$(echo "$json" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          total = sum(int(c.get('real_total', 0)) for c in data.values())
          doc = sum(int(c.get('real_documented', 0)) for c in data.values())
          print(f'{(doc/total)*100:.2f}' if total else '0.00')
          ")
          echo "::notice::workspace real doc coverage: ${real_pct}% (target >= ${DOC_COVERAGE_MIN}%)"
          python3 -c "
          import sys
          threshold = float('${DOC_COVERAGE_MIN}')
          actual = float('${real_pct}')
          if actual < threshold:
              print(f'::error::doc coverage {actual}% below threshold {threshold}%', file=sys.stderr)
              sys.exit(1)
          "

      - name: Security audit
        # Fail on warnings (matches `just audit`); RUSTSEC-2024-0436 (paste,
        # deep transitive via candle-core/gemm) is an accepted-risk INFO
        # advisory â€” see SECURITY.md "Audit History" for the full rationale.
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2024-0436 --deny warnings

  # CI-01 (technical due diligence): `--all-features` parity with
  # `just ci`. The default `ci` job above uses default features only
  # (because GitHub runners have no GPU), but `just ci` exercises
  # `--all-features`. Without this job, PRs can pass CI green and break
  # the `multi-node` / `cuda-graph` / `gguf` feature combos locally.
  # Build-only â€” no test execution â€” to keep wall-clock low.
  ci-all-features:
    name: CI (all-features build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (Swatinem rust-cache â€” separate key from default job)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."
          shared-key: "all-features"

      - name: Clippy (all features)
        # Mirrors `just clippy` exactly so a PR that breaks the
        # `--all-features` build (which `just ci` catches locally) is
        # blocked here too. Build-only: clippy's deny-tier lints only
        # fire on `cargo check`, no need to run tests.
        run: |
          cargo clippy --all-targets --workspace --all-features -- \
            -D clippy::correctness \
            -D clippy::suspicious \
            -D clippy::perf

      - name: Doc check (all features)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace --all-features

  matrix-test:
    name: Matrix Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo (Swatinem rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."
          shared-key: "matrix-${{ matrix.rust }}"

      - name: CI checks
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace
          cargo test --doc --workspace --all-features --no-fail-fast
          cargo nextest run --workspace --no-fail-fast
          cargo install cargo-public-api --locked
          bash .planning/phase-12e/check-public-api.sh
