name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable CUDA in CI (GitHub runners don't have GPU)
  CANDLE_NATIVE_BACKEND: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf

      - name: Doc check
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace

      - name: Test
        run: cargo nextest run --workspace --no-fail-fast

      - name: Security audit
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit || true

  matrix-test:
    name: Matrix Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-

      - name: CI checks
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace
          cargo nextest run --workspace --no-fail-fast
