name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Disable CUDA in CI (GitHub runners don't have GPU)
  CANDLE_NATIVE_BACKEND: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo (Swatinem rust-cache — profile/target-aware)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf

      - name: Doc check
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace

      - name: Test
        run: cargo nextest run --workspace --no-fail-fast

      - name: Security audit
        # Fail on warnings (matches `just audit`); RUSTSEC-2024-0436 (paste,
        # deep transitive via candle-core/gemm) is an accepted-risk INFO
        # advisory — see SECURITY.md "Audit History" for the full rationale.
        run: |
          cargo install cargo-audit --locked
          cargo audit --ignore RUSTSEC-2024-0436 --deny warnings

  matrix-test:
    name: Matrix Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Cache cargo (Swatinem rust-cache)
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "."
          shared-key: "matrix-${{ matrix.rust }}"

      - name: CI checks
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --workspace -- -D clippy::correctness -D clippy::suspicious -D clippy::perf
          RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --document-private-items --workspace
          cargo nextest run --workspace --no-fail-fast
