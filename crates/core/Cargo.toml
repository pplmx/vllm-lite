[package]
name = "vllm-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[dependencies]
vllm-traits = { path = "../traits" }
thiserror = "2"
tokio = { version = "1", features = ["sync"] }
rand = { version = "0.10", features = ["std"] }
serde = { version = "1", features = ["derive"] }

[dev-dependencies]
criterion = "0.5"
vllm-testing = { path = "../testing" }
