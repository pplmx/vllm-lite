[package]
name = "vllm-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[dependencies]
vllm-traits = { path = "../traits", features = ["candle", "kernels"] }
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "macros"] }
async-trait = "0.1"
rand = { version = "0.10", features = ["std"] }
serde = { version = "1", features = ["derive"] }
crossbeam = "0.8"
tracing = "0.1"
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true, optional = true }
opentelemetry = { workspace = true, optional = true }
dashmap = { workspace = true }

[features]
default = ["prometheus", "cuda-graph"]
prometheus = ["metrics-exporter-prometheus"]
opentelemetry = ["dep:opentelemetry"]
cuda-graph = ["dep:vllm-model"]

[dependencies.vllm-model]
path = "../model"
optional = true

[dev-dependencies]
criterion = "0.8"
vllm-testing = { path = "../testing" }

[[bench]]
name = "scheduler_benchmarks"
harness = false

[[bench]]
name = "prefix_cache_benchmarks"
harness = false
