[package]
name = "vllm-model"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true

[dependencies]
vllm-traits = { path = "../traits" }
vllm-dist = { path = "../dist" }
rand = "0.10"
candle-core = { version = "0.10.2", features = ["cuda"] }
candle-nn = { version = "0.10.2", features = ["cuda"] }
thiserror = "2"
safetensors = "0.7.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
half = "2"
rayon = "1.10"
memmap2 = "0.9"
tiktoken = { version = "3", optional = true }
tokenizers = { version = "0.22", optional = true }
gguf = "0.1"

[dev-dependencies]
tempfile = "3"
vllm-testing = { path = "../testing" }
criterion = "0.8"

[features]
default = []
real_weights = ["tiktoken", "tokenizers"]
