[package]
name = "vllm-model"
version = "0.1.0"
edition = "2021"

[dependencies]
vllm-core = { path = "../core" }
rand = "0.10"
candle-core = { version = "0.9", features = ["cuda"] }
candle-nn = { version = "0.9", features = ["cuda"] }
thiserror = "2"
safetensors = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
half = "2"
tiktoken = { version = "3", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = []
real_weights = ["tiktoken"]