# RBAC for vLLMEngine controller - ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vllmengine-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: vllmengine-controller
subjects:
  - kind: ServiceAccount
    name: vllm-operator
    namespace: vllm-system
