apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-lite.fullname" . }}
  labels:
    {{- include "vllm-lite.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vllm-lite.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vllm-lite.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vllm-lite.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthCheck.livenessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthCheck.readinessPath }}
              port: http
            initialDelaySeconds: {{ .Values.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.periodSeconds }}
            failureThreshold: {{ .Values.healthCheck.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          env:
            # DEP-01 (technical due diligence): the previous chart
            # emitted MODEL_PATH / MAX_BATCH_SIZE / NUM_KV_BLOCKS /
            # TENSOR_PARALLEL_SIZE, none of which the CLI reads —
            # clap uses VLLM_* prefixed env vars
            # (see crates/server/src/cli/args.rs). The mismatch
            # meant a helm-installed pod would silently fall back
            # to CLI defaults (e.g. required VLLM_MODEL would be
            # missing entirely) and the operator would have to
            # set the right vars manually. The chart now emits
            # the env vars the binary actually reads.
            - name: VLLM_MODEL
              value: {{ .Values.config.modelPath | quote }}
            - name: VLLM_MAX_BATCH_SIZE
              value: {{ .Values.config.maxBatchSize | quote }}
            - name: VLLM_KV_BLOCKS
              value: {{ .Values.config.numKvBlocks | quote }}
            - name: VLLM_TENSOR_PARALLEL_SIZE
              value: {{ .Values.config.tensorParallelSize | quote }}
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/vllm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "vllm-lite.fullname" . }}-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
