[workspace]
members = ["crates/core", "crates/model", "crates/server", "crates/traits", "crates/dist", "crates/testing", "benches"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["vLLM-lite Team"]
license = "MIT"
repository = "https://github.com/pplmx/vllm-lite"
homepage = "https://github.com/pplmx/vllm-lite"
rust-version = "1.85"

[workspace.metadata]
description = "A lightweight LLM inference engine in Rust implementing vLLM innovations"
keywords = ["llm", "inference", "vllm", "rust", "machine-learning"]
categories = ["machine-learning", "api-bindings"]

[workspace.dependencies]
thiserror = "2"
tokio = { version = "1", features = ["sync", "rt", "macros"] }
rand = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
metrics = "0.22"
metrics-exporter-prometheus = "0.13"
metrics-util = "0.16"
opentelemetry = "0.21"
opentelemetry-otlp = "0.14"
opentelemetry_sdk = "0.21"
tracing-opentelemetry = "0.22"
dashmap = "5.5"
tonic = "0.12"
prost = "0.13"
prost-build = "0.13"
tokio-stream = "0.1"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
